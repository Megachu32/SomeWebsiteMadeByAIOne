<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internet Cafe Project</title>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #1a1a1a;
        color: white;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      #info {
        position: absolute;
        top: 10px;
        width: 100%;
        text-align: center;
        z-index: 100;
        pointer-events: none;
        text-shadow: 1px 1px 2px black;
      }

      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(255, 255, 255, 0.7);
        font-size: 30px;
        font-weight: bold;
        z-index: 100;
        pointer-events: none;
        display: none;
        user-select: none;
      }

      #blocker {
        position: absolute;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 999;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      /* Styling for the Debug Copier */
      #debug-ui {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: rgba(0, 0, 0, 0.8);
        border: 2px solid #00ffaa;
        padding: 15px;
        border-radius: 8px;
        color: #00ffaa;
        font-family: monospace;
        font-size: 14px;
        z-index: 1000;
        cursor: pointer;
        display: none;
        user-select: none;
      }
      #debug-ui:hover {
        background-color: rgba(0, 255, 170, 0.2);
      }

      /* [NEW] Styling for the Live Coordinate Display */
      #coord-display {
        position: absolute;
        top: 10px;
        left: 10px;
        background-color: rgba(0, 0, 0, 0.7);
        padding: 10px;
        border-radius: 5px;
        color: #00ffaa;
        font-family: monospace;
        font-size: 14px;
        z-index: 1000;
        pointer-events: none; /* Allows clicks to pass through */
        display: none; /* Hidden until game starts */
      }
    </style>
  </head>
  <body>
    <div id="blocker">
      <h1
        style="
          font-size: 40px;
          cursor: pointer;
          border: 2px solid #00ffaa;
          padding: 15px 30px;
          border-radius: 10px;
          color: #00ffaa;
          text-transform: uppercase;
        "
      >
        ▶ Click To Play
      </h1>
      <p style="font-size: 1.2em">
        <strong>WASD</strong> = Move | <strong>SPACE</strong> = Jump |
        <strong> F</strong> = Sprint | <strong>C</strong> = Crouch |
        <strong>Left Click</strong> = Interact | <strong>P</strong> = Get
        Coordinates
      </p>
    </div>

    <!-- <div id="info">
      <h1>Project Base: Internet Cafe</h1>
    </div> -->

    <div id="crosshair">+</div>

    <div id="coord-display">
      X: 0.00 | Y: 0.00 | Z: 0.00<br />Yaw: 0.00 | Pitch: 0.00
    </div>

    <div id="debug-ui"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
      // ==============================================================================
      // 1. CORE SETUP
      // ==============================================================================
      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.y = 1.5;
      scene.add(camera);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      // ==============================================================================
      // 2. CONTROLS & UI
      // ==============================================================================
      const controls = new THREE.PointerLockControls(camera, document.body);
      const blocker = document.getElementById("blocker");
      const crosshair = document.getElementById("crosshair");
      const debugUI = document.getElementById("debug-ui");
      const coordDisplay = document.getElementById("coord-display");

      blocker.addEventListener("click", function () {
        controls.lock();
      });
      controls.addEventListener("lock", function () {
        blocker.style.display = "none";
        crosshair.style.display = "block";
        coordDisplay.style.display = "block";
      });
      controls.addEventListener("unlock", function () {
        blocker.style.display = "flex";
        crosshair.style.display = "none";
        coordDisplay.style.display = "none";
      });

      // Clipboard Copier Event
      debugUI.addEventListener("click", function () {
        navigator.clipboard.writeText(this.dataset.clipboard).then(() => {
          this.innerText =
            "✅ COPIED TO CLIPBOARD!\n\n" + this.dataset.clipboard;
        });
      });

      const raycaster = new THREE.Raycaster();
      const centerPosition = new THREE.Vector2(0, 0);

      const interactableObjects = [];
      const collidableObjects = [];
      const slidingDoors = [];
      const activeACs = [];

      const mixers = [];
      const animatedNPCs = [];
      const oscillatingFans = [];

      let scpTarget = null; // Variable to hold the SCP model

      // 1. Prevent the browser's right-click menu from popping up
      document.addEventListener("contextmenu", (event) =>
        event.preventDefault(),
      );

      // 2. Main Click Logic
      // 2. Main Click Logic
      document.addEventListener("mousedown", (event) => {
        if (controls.isLocked === true) {
          // RIGHT CLICK (Start Rotating)
          if (event.button === 2 && heldObject) {
            isRotatingItem = true;
            return;
          }

          // LEFT CLICK
          if (event.button === 0) {
            // ==========================================
            // 1. IF HOLDING AN ITEM -> DROP IT
            // ==========================================
            if (heldObject) {
              // Simply restore physical collision so you can walk on it / place things on it
              if (heldObject.userData.isSolid)
                collidableObjects.push(heldObject);

              heldObject = null;
              isRotatingItem = false;
              console.log("Item Placed!");
              return;
            }

            // ==========================================
            // 2. IF EMPTY HANDED -> TRY TO INTERACT
            // ==========================================
            raycaster.setFromCamera(centerPosition, camera);
            const intersects = raycaster.intersectObjects(interactableObjects);

            if (intersects.length > 0) {
              const hitObject = intersects[0].object;

              console.log("🎯 YOU CLICKED EXACTLY ON: " + hitObject.name);

              // --- A. DOOR LOGIC (Smooth Sliding) ---
              if (hitObject.userData.isDoorHitbox) {
                hitObject.material.opacity = 0.3;
                setTimeout(() => {
                  hitObject.material.opacity = 0;
                }, 150);

                const doorObj = hitObject.userData.doorReference;
                if (doorObj) {
                  // Toggle state
                  doorObj.userData.isClosed = !doorObj.userData.isClosed;

                  // Set the new target coordinate based on the state
                  doorObj.userData.targetX = doorObj.userData.isClosed
                    ? doorObj.userData.closedX
                    : doorObj.userData.openX;
                }
              }

              // --- B. AIR CONDITIONER LOGIC ---
              else if (hitObject.userData.parentAC) {
                const ac = hitObject.userData.parentAC;
                ac.userData.isOn = !ac.userData.isOn;

                if (ac.userData.animAction) {
                  if (ac.userData.isOn) {
                    ac.userData.animAction.play();
                  } else {
                    ac.userData.animAction.stop();
                  }
                }

                if (hitObject.material && hitObject.material.color) {
                  const originalColor = hitObject.material.color.getHex();
                  hitObject.material.color.setHex(0x00ffff);
                  setTimeout(() => {
                    hitObject.material.color.setHex(originalColor);
                  }, 150);
                }
              }

              // --- C. INVENTORY PICKUP LOGIC ---
              else if (
                hitObject.userData.parentWrapper &&
                movableModelNames.includes(
                  hitObject.userData.parentWrapper.userData.modelName,
                )
              ) {
                const wrapper = hitObject.userData.parentWrapper;
                heldObject = wrapper;
                previewRotationY = wrapper.rotation.y;

                // 1. Remove from collisions so it doesn't block the placement laser
                const colIndex = collidableObjects.indexOf(wrapper);
                if (colIndex > -1) collidableObjects.splice(colIndex, 1);

                // (The ghosting/transparency logic has been completely removed here)

                console.log("Picked up: " + wrapper.userData.modelName);
              }
              // --- E. FAN LOGIC ---
              // --- E. FAN LOGIC (3-Speed Toggle) ---
              else if (hitObject.userData.parentFan) {
                const fan = hitObject.userData.parentFan;

                // Cycle through speeds: 0 -> 1 -> 2 -> 3 -> 0
                fan.userData.fanSpeedLevel =
                  (fan.userData.fanSpeedLevel + 1) % 4;
                fan.userData.isOscillating = fan.userData.fanSpeedLevel > 0; // Turn on if above 0

                // Flash a color to indicate the speed level: Off(Grey), Low(Green), Med(Yellow), High(Red)
                const speedColors = [0x555555, 0x00ff00, 0xffff00, 0xff0000];

                if (hitObject.material && hitObject.material.color) {
                  const originalColor = hitObject.material.color.getHex();
                  hitObject.material.color.setHex(
                    speedColors[fan.userData.fanSpeedLevel],
                  );
                  setTimeout(() => {
                    hitObject.material.color.setHex(originalColor);
                  }, 200);
                }
                console.log(
                  "Fan Speed shifted to level: " + fan.userData.fanSpeedLevel,
                );
              }

              // --- D. DEFAULT CLICK FEEDBACK ---
              else if (hitObject.material && hitObject.material.color) {
                const originalColor = hitObject.material.color.getHex();
                hitObject.material.color.setHex(0xff0000);
                setTimeout(() => {
                  hitObject.material.color.setHex(originalColor);
                }, 150);
              }
            }
          }
        }
      });

      // 3. RIGHT CLICK RELEASE (Stop Rotating)
      document.addEventListener("mouseup", (event) => {
        if (event.button === 2) {
          isRotatingItem = false;
        }
      });

      // 4. DRAG TO ROTATE LOGIC
      document.addEventListener("mousemove", (event) => {
        if (controls.isLocked && heldObject && isRotatingItem) {
          // Spin based on how fast the mouse moves horizontally
          previewRotationY += event.movementX * 0.01;
        }
      });

      // [NEW] MOUSE WHEEL ROTATION
      document.addEventListener("wheel", (event) => {
        if (controls.isLocked && heldObject) {
          // Scroll up or down to rotate by roughly 15 degrees (0.26 radians)
          previewRotationY += event.deltaY < 0 ? 0.26 : -0.26;
        }
      });

      // ==============================================================================
      // 3. MOVEMENT & PHYSICS VARIABLES
      // ==============================================================================
      let moveForward = false,
        moveBackward = false,
        moveLeft = false,
        moveRight = false;
      let canJump = false;
      let isCrouching = false;
      let isSprinting = false;

      const velocity = new THREE.Vector3();
      const direction = new THREE.Vector3();
      const clock = new THREE.Clock();

      // [NEW] Inventory & Sandbox Variables
      const movableModelNames = [
        "office_chair",
        "lowpoly_pizza_box",
        "basic_keyboard",
        "computer_mouse_low-poly",
        "playstation_5_digital_lowpoly",
        "low_poly_controller",
      ];

      let heldObject = null; // The actual model hidden in your inventory
      let placementPreview = null; // The glowing green hologram
      let previewRotationY = 0; // The current rotation angle
      let isRotatingItem = false; // [NEW] Tracks if right-click is held down

      const onKeyDown = function (event) {
        switch (event.code) {
          case "KeyW":
            moveForward = true;
            break;
          case "KeyA":
            moveLeft = true;
            break;
          case "KeyS":
            moveBackward = true;
            break;
          case "KeyD":
            moveRight = true;
            break;
          case "Space":
            if (canJump === true) {
              velocity.y = 10.0;
              canJump = false;
            }
            break;
          case "KeyC":
            isCrouching = true;
            break;
          case "KeyF": // [NEW] Sprint Toggle!
            isSprinting = !isSprinting;
            break;
          case "KeyP":
            const pos = controls.getObject().position;
            const rotY = camera.rotation.y;

            const px = pos.x.toFixed(2);
            const py = (pos.y - 1.5).toFixed(2);
            const pz = pos.z.toFixed(2);
            const ry = rotY.toFixed(2);

            const snippet = `loadModel('[Folder Name]', 1, ${px}, ${py}, ${pz}, 0, ${ry}, 0, true);`;

            debugUI.innerText = "📋 CLICK TO COPY PRESET:\n\n" + snippet;
            debugUI.style.display = "block";
            debugUI.dataset.clipboard = snippet;

            if (window.debugTimeout) clearTimeout(window.debugTimeout);
            window.debugTimeout = setTimeout(() => {
              debugUI.style.display = "none";
            }, 10000);
            break;
        }
      };

      const onKeyUp = function (event) {
        switch (event.code) {
          case "KeyW":
            moveForward = false;
            break;
          case "KeyA":
            moveLeft = false;
            break;
          case "KeyS":
            moveBackward = false;
            break;
          case "KeyD":
            moveRight = false;
            break;
          case "KeyC":
            isCrouching = false;
            break;
        }
      };

      document.addEventListener("keydown", onKeyDown);
      document.addEventListener("keyup", onKeyUp);

      function getPlayerBox(cameraPos) {
        const height = isCrouching ? 0.9 : 1.8;

        const bottomY = cameraPos.y - (isCrouching ? 0.75 : 1.5) + 0.5;
        const topY = cameraPos.y + 0.1;

        return new THREE.Box3(
          new THREE.Vector3(cameraPos.x - 0.3, bottomY, cameraPos.z - 0.3),
          new THREE.Vector3(cameraPos.x + 0.3, topY, cameraPos.z + 0.3),
        );
      }

      // ==============================================================================
      // 4. LIGHTING & ENVIRONMENT
      // ==============================================================================
      // Slightly dimmed ambient light so the indoor lamps stand out more
      scene.add(new THREE.AmbientLight(0xffffff, 0.2));

      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(20, 40, 20);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.width = 2048;
      directionalLight.shadow.mapSize.height = 2048;

      directionalLight.shadow.camera.left = -50;
      directionalLight.shadow.camera.right = 50;
      directionalLight.shadow.camera.top = 50;
      directionalLight.shadow.camera.bottom = -50;
      directionalLight.shadow.camera.far = 150;

      scene.add(directionalLight);

      const floorGeometry = new THREE.PlaneGeometry(100, 100);
      const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x555555 });
      const floor = new THREE.Mesh(floorGeometry, floorMaterial);
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      floor.receiveShadow = true;

      floor.userData.isSolid = true; // [NEW] Tell the engine it's solid
      scene.add(floor);
      collidableObjects.push(floor); // [NEW] Add it to the Raycaster hit-list!

      // ==============================================================================
      // [NEW] 3x3 INDOOR CEILING LIGHTS (Based on 5x5 Grid)
      // ==============================================================================

      const xCoords = [-8, 0, 8];
      const zCoords = [22, 30, 38];

      // MeshBasicMaterial is unaffected by shadow/light, so it always looks glowing white!
      const lampMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const lampGeometry = new THREE.BoxGeometry(2, 0.1, 0.5); // Rectangular fluorescent tube

      for (let x of xCoords) {
        for (let z of zCoords) {
          // 1. The Actual Light Source (color, intensity, distance, decay)
          const indoorLight = new THREE.PointLight(0xffffee, 0.6, 25, 2);
          indoorLight.position.set(x, 9.5, z); // Hangs slightly below the ceiling

          // indoorLight.castShadow = true; // UNCOMMENT AT YOUR OWN RISK! Kills FPS.
          scene.add(indoorLight);

          // 2. The Physical Lamp Fixture
          const lampFixture = new THREE.Mesh(lampGeometry, lampMaterial);
          lampFixture.position.set(x, 9.9, z); // Glued directly to the ceiling (Y=10)
          scene.add(lampFixture);
        }
      }

      // ==============================================================================
      // 5. THE BUILDING
      // ==============================================================================
      const textureLoader = new THREE.TextureLoader();

      // Load the base wall texture
      const wallTex = textureLoader.load("texture/wall.png");
      wallTex.repeat.set(1, 1);

      // Standard material for the solid walls (Left, Right, Back, Roof)
      const wallMaterial = new THREE.MeshStandardMaterial({
        map: wallTex,
        roughness: 0.8,
        metalness: 0.1,
      });

      const customBoxGeo = new THREE.BoxGeometry(0.2, 0.75, 0.2);
      const customBoxMat = new THREE.MeshStandardMaterial({
        color: 0xaaaaaa, // Simple grey, feel free to change!
        roughness: 0.8,
        metalness: 0.1,
      });
      const customBox = new THREE.Mesh(customBoxGeo, customBoxMat);

      // Snapped exactly to your screenshot coordinates
      customBox.position.set(14.9, 0.2, 18.9);
      customBox.rotation.y = 0.82; // Spun to match your camera Yaw

      customBox.castShadow = true;
      customBox.receiveShadow = true;
      customBox.userData.isSolid = true; // Makes sure you can bump into it

      scene.add(customBox);
      collidableObjects.push(customBox);

      // --- FRACTION CALCULATIONS FOR FRONT WALL ---
      // Total wall is 40m wide and 10m high.

      // 1. Front Left (Width: 19m) -> 19/40 = 0.475
      const texFrontLeft = textureLoader.load("texture/wall.png");
      texFrontLeft.repeat.set(19 / 40, 1);
      texFrontLeft.offset.set(0, 0);
      const matFrontLeft = new THREE.MeshStandardMaterial({
        map: texFrontLeft,
        roughness: 0.8,
        metalness: 0.1,
      });

      // 2. Front Right (Width: 19m) -> Starts after 19m (left) + 2m (door) = 21m. 21/40 = 0.525
      const texFrontRight = textureLoader.load("texture/wall.png");
      texFrontRight.repeat.set(19 / 40, 1);
      texFrontRight.offset.set(21 / 40, 0);
      const matFrontRight = new THREE.MeshStandardMaterial({
        map: texFrontRight,
        roughness: 0.8,
        metalness: 0.1,
      });

      // 3. Front Top Header (Width: 2m, Height: 7.8m)
      // Starts horizontally at 19m (19/40). Starts vertically above the 2.2m door (2.2/10).
      const texFrontTop = textureLoader.load("texture/wall.png");
      texFrontTop.repeat.set(2 / 40, 7.8 / 10);
      texFrontTop.offset.set(19 / 40, 2.2 / 10);
      const matFrontTop = new THREE.MeshStandardMaterial({
        map: texFrontTop,
        roughness: 0.8,
        metalness: 0.1,
      });

      // Load the floor texture
      const floorTex = textureLoader.load("texture/floor.png");
      floorTex.wrapS = THREE.RepeatWrapping;
      floorTex.wrapT = THREE.RepeatWrapping;
      floorTex.repeat.set(10, 10);

      const innerFloorMaterial = new THREE.MeshStandardMaterial({
        map: floorTex,
        roughness: 0.8,
      });

      // Added a customMaterial parameter so we can use different textures
      function createWall(w, h, d, x, y, z, customMaterial = wallMaterial) {
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(w, h, d),
          customMaterial,
        );
        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData.isSolid = true;
        scene.add(mesh);
        collidableObjects.push(mesh);
      }

      // Standard solid walls
      createWall(1, 10, 40, -19.5, 5, 30); // Left Wall
      createWall(1, 10, 40, 19.5, 5, 30); // Right Wall
      createWall(40, 10, 1, 0, 5, 49.5); // Back Wall
      createWall(40, 1, 40, 0, 10.5, 30); // Roof

      // Front wall broken into seamless fractions
      createWall(19, 10, 1, -10.5, 5, 10.5, matFrontLeft); // Front Left
      createWall(19, 10, 1, 10.5, 5, 10.5, matFrontRight); // Front Right
      createWall(2, 7.8, 1, 0, 6.1, 10.5, matFrontTop); // Front Top Header

      // Inner Wooden Floor
      createWall(38, 0.1, 38, 0, 0.05, 30, innerFloorMaterial);

      // ==============================================================================
      // 6. INTERNET CAFE FURNITURE (COUNTER)
      // ==============================================================================
      const counterGeometry = new THREE.BoxGeometry(3, 1.0, 1);
      const counterMaterial = new THREE.MeshStandardMaterial({
        color: 0x5c4033,
        roughness: 0.8,
      });
      const counter = new THREE.Mesh(counterGeometry, counterMaterial);

      counter.position.set(-5, 0.5, 20);
      counter.castShadow = true;
      counter.receiveShadow = true;
      counter.userData.isSolid = true;

      scene.add(counter);
      collidableObjects.push(counter);
      interactableObjects.push(counter);

      // ==============================================================================
      // 7. PROXY HITBOX (The Invisible Door Click Target)
      // ==============================================================================
      const hitboxGeometry = new THREE.BoxGeometry(2, 2.2, 1);
      const hitboxMaterial = new THREE.MeshBasicMaterial({
        color: 0xff0000,
        transparent: true,
        opacity: 0,
        depthWrite: false,
      });

      const doorHitbox = new THREE.Mesh(hitboxGeometry, hitboxMaterial);
      doorHitbox.position.set(0, 1.1, 10.5);
      doorHitbox.userData = { isDoorHitbox: true, doorReference: null };

      scene.add(doorHitbox);
      interactableObjects.push(doorHitbox);

      // ==============================================================================
      // 8. ASSET LOADER (DOOR & CUSTOM PRESET FUNCTION)
      // ==============================================================================
      const gltfLoader = new THREE.GLTFLoader();

      // [NEW] Sliding Door Variables
      const DOOR_SPEED = 2.5; // Speed in meters per second
      const DOOR_CLOSED_X = 0; // Base location
      const DOOR_OPEN_X = 2.0; // A little bit to the right

      gltfLoader.load("asset/sliding_door/scene.gltf", function (gltf) {
        const door = gltf.scene;
        door.scale.set(1, 1, 1);
        door.position.set(DOOR_CLOSED_X, 0, 10.5); // Start at closed position

        door.userData = {
          isDoor: true,
          isSolid: true, // Always solid now, since it physically moves!
          isClosed: true,
          targetX: DOOR_CLOSED_X,
          openX: DOOR_OPEN_X,
          closedX: DOOR_CLOSED_X,
          speed: DOOR_SPEED,
        };

        collidableObjects.push(door);
        slidingDoors.push(door); // Add to our animation loop list!
        doorHitbox.userData.doorReference = door;

        door.traverse(function (node) {
          if (node.isMesh) {
            node.castShadow = true;
            node.receiveShadow = true;
            if (node.material) {
              node.material.metalness = 0.1;
              node.material.roughness = 0.8;
            }
          }
        });
        scene.add(door);
      });

      function loadModel(
        folderName,
        scale,
        posX,
        posY,
        posZ,
        rotX,
        rotY,
        rotZ,
        isSolid,
        autoCenter = false,
      ) {
        gltfLoader.load(
          "asset/" + folderName + "/scene.gltf",
          function (gltf) {
            const wrapper = new THREE.Group();
            const model = gltf.scene;

            if (autoCenter) {
              const box = new THREE.Box3().setFromObject(model);
              const center = box.getCenter(new THREE.Vector3());

              model.position.x = -center.x;
              model.position.y = -box.min.y;
              model.position.z = -center.z;
            }

            wrapper.add(model);

            wrapper.scale.set(scale, scale, scale);
            wrapper.position.set(posX, posY, posZ);
            wrapper.rotation.set(rotX, rotY, rotZ);

            wrapper.userData.isSolid = isSolid;
            wrapper.userData.modelName = folderName;

            if (isSolid) collidableObjects.push(wrapper);

            // Setup simple AI for Connor AND North
            if (
              folderName === "connor_rk900_-_detroit_become_human" ||
              folderName === "north_-_detroit_become_human"
            ) {
              wrapper.userData.isNPC = true;
              wrapper.userData.patrolTimer = 0;
              animatedNPCs.push(wrapper);
            }

            // Setup Air Conditioner
            if (folderName === "air_conditioner") {
              wrapper.userData.isAC = true;
              wrapper.userData.isOn = false;

              // [NEW] Flap Variables
              wrapper.userData.acFlap = null;
              wrapper.userData.baseRotationY = 0; // Third time's the charm: Y!

              wrapper.traverse(function (node) {
                if (node.isMesh) {
                  if (node.name.includes("Plane002_White")) {
                    wrapper.userData.acFlap = node;

              wrapper.userData.fanSpeedLevel = 0; // 0 = Off, 1 = Low, 2 = Med, 3 = High
              wrapper.userData.fanSpeeds = [0, 1.5, 3.5, 7.0]; // The actual math speed multipliers

            wrapper.traverse(function (node) {

      // -----------------------------------------

      // ==============================================================================
      // 9. ANIMATION LOOP & PHYSICS ENGINE
      // ==============================================================================
      function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();

        // [NEW] 1. Update all animations
        for (let i = 0; i < mixers.length; i++) {
          mixers[i].update(delta);
        }

        // [NEW] FAN OSCILLATION LOOP (Multi-Speed)
        for (let i = 0; i < oscillatingFans.length; i++) {
          let fan = oscillatingFans[i];

          if (fan.userData.isOscillating && fan.userData.fanHead) {
            // Get the current speed from our array (1.5, 3.5, or 7.0)
            let currentSpeed =
              fan.userData.fanSpeeds[fan.userData.fanSpeedLevel];

            // Push time forward multiplied by our speed
            fan.userData.oscillationTimer += delta * currentSpeed;

            // Math.sin swings between -1 and 1. Multiplied by PI/2 means a 90 degree swing each way.
            const swingAngle =
              Math.sin(fan.userData.oscillationTimer) * (Math.PI / 2);

            fan.userData.fanHead.rotation.y =
              fan.userData.baseRotationY + swingAngle;
          }
        }

        // [NEW] AC FLAP OSCILLATION LOOP
        for (let i = 0; i < activeACs.length; i++) {
          let ac = activeACs[i];

          if (ac.userData.isOn && ac.userData.acFlap) {
            const time = clock.getElapsedTime();
            const swingAngle = Math.sin(time * 2.0) * (Math.PI / 6);

            // Changed to rotate the Y axis!
            ac.userData.acFlap.rotation.y =
              ac.userData.baseRotationY + swingAngle;
          }
        }

        // [NEW] SLIDING DOOR ANIMATION LOOP
        for (let i = 0; i < slidingDoors.length; i++) {
          let door = slidingDoors[i];
          let target = door.userData.targetX;

          // If the door is not at its target coordinate...
          if (door.position.x !== target) {
            let distance = target - door.position.x;
            let step = door.userData.speed * delta; // How far to move this frame

            // If the door is close enough, snap it exactly to the target so it doesn't jitter
            if (Math.abs(distance) <= step) {
              door.position.x = target;
            } else {
              // Otherwise, keep sliding in the correct direction (Math.sign returns +1 or -1)
              door.position.x += Math.sign(distance) * step;
            }
          }
        }

        // [NEW] 2. Simple Patrol AI
        for (let i = 0; i < animatedNPCs.length; i++) {
          let npc = animatedNPCs[i];

          // Move the NPC forward at a speed of 1.5 meters per second
          // npc.translateZ(1.5 * delta);

          // Timer: Make him turn around every 5 seconds
          // npc.userData.patrolTimer += delta;
          // if (npc.userData.patrolTimer > 5.0) {
          //   npc.rotation.y += Math.PI; // Spin exactly 180 degrees (3.14 radians)
          //   npc.userData.patrolTimer = 0; // Reset the timer
          // }
        }

        if (controls.isLocked === true) {
          // ==========================================================================
          // [NEW] SCP-173 VISIBILITY AND PHYSICS LOGIC
          // ==========================================================================
          if (scpTarget) {
            // 1. Construct the camera's View Frustum (Vision Pyramid)
            const frustum = new THREE.Frustum();
            const projScreenMatrix = new THREE.Matrix4();
            projScreenMatrix.multiplyMatrices(
              camera.projectionMatrix,
              camera.matrixWorldInverse,
            );
            frustum.setFromProjectionMatrix(projScreenMatrix);

            // 2. Check if the SCP's Bounding Box intersects the Frustum
            const scpBox = new THREE.Box3().setFromObject(scpTarget);
            const isVisible = frustum.intersectsBox(scpBox);

            if (isVisible) {
              if (!scpTarget.userData.hasBeenLookedAt) {
                scpTarget.userData.hasBeenLookedAt = true;
              }
              if (!scpTarget.userData.isCurrentlyLookedAt) {
                scpTarget.userData.isCurrentlyLookedAt = true;
                scpTarget.userData.isFloating = false; // Player is looking, gravity engages
              }
            } else {
              if (
                scpTarget.userData.hasBeenLookedAt &&
                scpTarget.userData.isCurrentlyLookedAt
              ) {
                scpTarget.userData.isCurrentlyLookedAt = false;
                scpTarget.userData.isFloating = true; // Player looked away, disable gravity

                // Teleport up by half its height
                const height = scpBox.max.y - scpBox.min.y;
                scpTarget.position.y += height / 2;
                scpTarget.userData.velocityY = 0; // Reset velocity
              }
            }

            // ==========================================================
            // [NEW] PHYSICS GUN PLACEMENT TRACKING
            // ==========================================================
            if (heldObject) {
              raycaster.setFromCamera(centerPosition, camera);
              const intersects = raycaster.intersectObjects(
                collidableObjects,
                true,
              );

              if (intersects.length > 0) {
                // 1. It hit the floor or a table! Snap perfectly to it.
                heldObject.position.copy(intersects[0].point);
                // console.log("🎯 YOU CLICKED EXACTLY ON: " + hitObject.name);
              } else {
                // 2. Looking at the sky! Float it 3 meters in front of the camera.
                const lookAtVector = new THREE.Vector3(0, 0, -3);
                lookAtVector.applyMatrix4(camera.matrixWorld);
                heldObject.position.copy(lookAtVector);
              }

              // Apply mouse-wheel rotation
              heldObject.rotation.y = previewRotationY;
            }
            // ==========================================================

            // 3. Apply gravity if the SCP is currently being looked at
            if (
              !scpTarget.userData.isFloating &&
              scpTarget.userData.hasBeenLookedAt
            ) {
              scpTarget.userData.velocityY -= 40.0 * delta; // Match the player's gravity strength
              scpTarget.position.y += scpTarget.userData.velocityY * delta;

              // Prevent it from falling through the floor
              if (scpTarget.position.y < 0) {
                scpTarget.position.y = 0;
                scpTarget.userData.velocityY = 0;
              }
            }
          }
          // ==========================================================================

          velocity.x -= velocity.x * 10.0 * delta;
          velocity.z -= velocity.z * 10.0 * delta;
          velocity.y -= 40.0 * delta;

          direction.z = Number(moveForward) - Number(moveBackward);
          direction.x = Number(moveRight) - Number(moveLeft);
          direction.normalize();

          let currentSpeed = 40.0; // Default walking speed

          if (isCrouching) {
            currentSpeed = 20.0; // Crouching overrides everything
          } else if (isSprinting) {
            currentSpeed = 80.0; // Double speed!
          }

          if (moveForward || moveBackward)
            velocity.z -= direction.z * currentSpeed * delta;
          if (moveLeft || moveRight)
            velocity.x -= direction.x * currentSpeed * delta;

          const pos = controls.getObject().position;
          const oldPos = pos.clone();

          // Move X
          controls.moveRight(-velocity.x * delta);
          let playerBox = getPlayerBox(pos);
          for (let obj of collidableObjects) {
            if (obj.userData.isSolid) {
              if (
                playerBox.intersectsBox(new THREE.Box3().setFromObject(obj))
              ) {
                pos.copy(oldPos);
                break;
              }
            }
          }
          oldPos.copy(pos);

          // Move Z
          controls.moveForward(-velocity.z * delta);
          playerBox = getPlayerBox(pos);
          for (let obj of collidableObjects) {
            if (obj.userData.isSolid) {
              if (
                playerBox.intersectsBox(new THREE.Box3().setFromObject(obj))
              ) {
                pos.copy(oldPos);
                break;
              }
            }
          }

          // Move Y
          pos.y += velocity.y * delta;
          const standHeight = isCrouching ? 0.75 : 1.5;
          let currentFloorHeight = 0;

          const downRay = new THREE.Raycaster(pos, new THREE.Vector3(0, -1, 0));

          // [UPDATED] Added 'true' to recursively check inside GLTF groups
          const groundHits = downRay.intersectObjects(collidableObjects, true);

          for (let i = 0; i < groundHits.length; i++) {
            let hitObj = groundHits[i].object;
            let isSolid = false;

            // [NEW] Climb up the family tree. If we hit a computer key,
            // check if the keyboard model itself is solid.
            while (hitObj) {
              if (hitObj.userData.isSolid) {
                isSolid = true;
                break;
              }
              hitObj = hitObj.parent;
            }

            if (isSolid) {
              currentFloorHeight = groundHits[i].point.y;
              break;
            }
          }

          const targetHeight = currentFloorHeight + standHeight;

          if (pos.y < targetHeight) {
            velocity.y = 0;
            pos.y = targetHeight;
            canJump = true;
          }

          const liveX = pos.x.toFixed(2);
          const liveY = pos.y.toFixed(2);
          const liveZ = pos.z.toFixed(2);
          const liveYaw = camera.rotation.y.toFixed(2);
          const livePitch = camera.rotation.x.toFixed(2);
          coordDisplay.innerHTML = `X: ${liveX} | Y: ${liveY} | Z: ${liveZ}<br>Yaw: ${liveYaw} | Pitch: ${livePitch}`;
        }

        renderer.render(scene, camera);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      window.onload = function () {
        animate();
      };
